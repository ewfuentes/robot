# Stage 2 v29 — v22 (best 0.2503) + PanoramaProperNounExtractor on pano side.
# v22's ceiling appears to be ~0.247-0.250 across seeds. v23-v28 showed that
# architectural scaling / data filter / warm-start tweaks can't move the
# ceiling. Adding a GENUINELY NEW input feature — explicit proper-noun
# embeddings from pano_gemini — gives the pano model information the tag
# bundle doesn't carry. Hypothesis: proper nouns disambiguate landmarks
# whose tag bundles are similar (e.g., two different bars on the same block).
opt_config:
  num_epochs: 80
  batch_size: 256
  lr_schedule:
    initial_lr: 0.0003
    lr_step_factor: 0.5
    num_epochs_at_lr: 30
    warmup_factor: 1.0
    num_warmup_epochs: 0
  enable_hard_negative_sampling_after_epoch_idx: 20
  hard_negative_pool_size: 25
  random_sample_type: nearest
sat_model_config:
  kind: SwagPatchEmbeddingConfig
  position_embedding_config:
    kind: PlanarPositionEmbeddingConfig
    min_scale: 10.0
    scale_step: 2.0
    embedding_dim: 32
  aggregation_config:
    kind: TransformerAggregatorConfig
    num_transformer_layers: 1
    num_attention_heads: 4
    hidden_dim: 4096
    dropout_frac: 0.0
    norm_first: true
  patch_dims:
  - 320
  - 320
  output_dim: 2048
  num_embeddings: 1
  extractor_config_by_name:
    safa_extractor:
      kind: SafaExtractorConfig
      model_path: /data/overhead_matching/training_outputs/260215_baseline_retraining/260218_093851_all_chicago_dinov3_wag_bs18_v2/best_satellite
      freeze: true
    osm_tag_bundle_extractor:
      kind: OSMTagBundleExtractorConfig
      landmark_type: point
      tag_text_embedding_path: /data/overhead_matching/datasets/landmark_correspondence/eval_text_embeddings_panov2_tuned_v5_all.pkl
      encoder:
        key_dim: 32
        text_input_dim: 768
        text_proj_dim: null
        per_tag_dim: 1024
  use_cached_extractors:
  - safa_extractor
  auxiliary_info: {}
  normalize_embeddings: true
  normalize_input_tokens: true
  feature_map_extractor_config: null
  semantic_token_extractor_config: null
  use_cached_feature_maps: false
  use_cached_semantic_tokens: false
pano_model_config:
  kind: SwagPatchEmbeddingConfig
  position_embedding_config:
    kind: SphericalPositionEmbeddingConfig
    scale_step: 2.0
    embedding_dim: 64
  aggregation_config:
    kind: TransformerAggregatorConfig
    num_transformer_layers: 1
    num_attention_heads: 4
    hidden_dim: 4096
    dropout_frac: 0.0
    norm_first: true
  patch_dims:
  - 320
  - 640
  output_dim: 2048
  num_embeddings: 1
  extractor_config_by_name:
    safa_extractor:
      kind: SafaExtractorConfig
      model_path: /data/overhead_matching/training_outputs/260215_baseline_retraining/260218_093851_all_chicago_dinov3_wag_bs18_v2/best_panorama
      freeze: true
    pano_tag_bundle_extractor:
      kind: PanoramaTagBundleExtractorConfig
      tag_text_embedding_path: /data/overhead_matching/datasets/landmark_correspondence/eval_text_embeddings_panov2_tuned_v5_all.pkl
      panov2_root: /data/overhead_matching/datasets/semantic_landmark_embeddings/panov2_tuned_prompt
      encoder:
        key_dim: 32
        text_input_dim: 768
        text_proj_dim: null
        per_tag_dim: 1024
    pano_proper_noun_extractor:
      kind: PanoramaProperNounExtractorConfig
      openai_embedding_size: 1536
      embedding_version: pano_gemini
      auxiliary_info_key: pano_landmark_base
  use_cached_extractors:
  - safa_extractor
  auxiliary_info:
    pano_landmark_base: /data/overhead_matching/datasets/semantic_landmark_embeddings
  normalize_embeddings: true
  normalize_input_tokens: true
  feature_map_extractor_config: null
  semantic_token_extractor_config: null
  use_cached_feature_maps: false
  use_cached_semantic_tokens: false
distance_model_config:
  kind: CosineDistanceConfig
dataset_config:
  paths:
  - Chicago
  landmark_version: v4_202001
  factor: 1.0
  panorama_landmark_radius_px: 640.0
  landmark_correspondence_inflation_factor: 1.0
  require_proper_noun_match: false
  pano_gemini_base_path: null
validation_dataset_configs:
- paths:
  - Seattle
  landmark_version: v4_202001
  factor: 1.0
  panorama_landmark_radius_px: 640.0
  landmark_correspondence_inflation_factor: 1.0
  require_proper_noun_match: false
  pano_gemini_base_path: null
distill_config:
  weight_sat: 1.0
  weight_pano: 1.0
  log_attention_every_n_batches: 100
  safa_extractor_name: safa_extractor
  loss_kind: cosine
  info_nce_temperature: 0.07
  cross_view_contrastive_weight: 0.05
  cross_view_contrastive_temperature: 0.1
output_dir: safa_v29_pano_proper_noun
tensorboard_output: null
