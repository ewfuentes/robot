opt_config:
  num_epochs: 480
  batch_size: 512
  lr_schedule:
    initial_lr: 0.0001
    lr_step_factor: 1.0
    num_epochs_at_lr: 20
    warmup_factor: 1.0
    num_warmup_epochs: 0
  enable_hard_negative_sampling_after_epoch_idx: 20
  hard_negative_pool_size: 25
  random_sample_type: nearest
  lr_sweep_config: null
sat_model_config:
  kind: SwagPatchEmbeddingConfig
  position_embedding_config:
    kind: PlanarPositionEmbeddingConfig
    min_scale: 0.1
    scale_step: 2.0
    embedding_dim: 64
  aggregation_config:
    kind: TransformerAggregatorConfig
    num_transformer_layers: 1
    num_attention_heads: 1
    hidden_dim: 1024
    dropout_frac: 0.0
  patch_dims:
  - 320
  - 320
  output_dim: 256
  num_embeddings: 1
  extractor_config_by_name:
    safa_extractor:
      kind: SafaExtractorConfig
      model_path: /data/overhead_matching/training_outputs/260215_baseline_retraining/260218_093851_all_chicago_dinov3_wag_bs18_v2/best_satellite
      freeze: true
  use_cached_extractors:
  - safa_extractor
  auxiliary_info: {}
  normalize_embeddings: true
  normalize_input_tokens: true
  feature_map_extractor_config: null
  semantic_token_extractor_config: null
  use_cached_feature_maps: false
  use_cached_semantic_tokens: false
pano_model_config:
  kind: SwagPatchEmbeddingConfig
  position_embedding_config:
    kind: SphericalPositionEmbeddingConfig
    scale_step: 2.0
    embedding_dim: 64
  aggregation_config:
    kind: TransformerAggregatorConfig
    num_transformer_layers: 1
    num_attention_heads: 1
    hidden_dim: 1024
    dropout_frac: 0.0
  patch_dims:
  - 320
  - 640
  output_dim: 256
  num_embeddings: 1
  extractor_config_by_name:
    safa_extractor:
      kind: SafaExtractorConfig
      model_path: /data/overhead_matching/training_outputs/260215_baseline_retraining/260218_093851_all_chicago_dinov3_wag_bs18_v2/best_panorama
      freeze: true
  use_cached_extractors:
  - safa_extractor
  auxiliary_info: {}
  normalize_embeddings: true
  normalize_input_tokens: true
  feature_map_extractor_config: null
  semantic_token_extractor_config: null
  use_cached_feature_maps: false
  use_cached_semantic_tokens: false
distance_model_config:
  kind: CosineDistanceConfig
dataset_config:
  paths:
  - Chicago
  landmark_version: v1
  factor: 1.0
  panorama_landmark_radius_px: 640.0
  landmark_correspondence_inflation_factor: 1.0
  require_proper_noun_match: false
  pano_gemini_base_path: null
validation_dataset_configs:
- paths:
  - Seattle
  landmark_version: v1
  factor: 1.0
  panorama_landmark_radius_px: 640.0
  landmark_correspondence_inflation_factor: 1.0
  require_proper_noun_match: false
  pano_gemini_base_path: null
- paths:
  - Chicago
  landmark_version: v1
  factor: 0.3
  panorama_landmark_radius_px: 640.0
  landmark_correspondence_inflation_factor: 1.0
  require_proper_noun_match: false
  pano_gemini_base_path: null
loss_configs:
- kind: PairwiseContrastiveLossConfig
  positive_weight: 5.0
  avg_positive_similarity: 0.0
  semipositive_weight: 6.0
  avg_semipositive_similarity: 0.3
  negative_weight: 20.0
  avg_negative_similarity: 0.7
- kind: BatchUniformityLossConfig
  batch_uniformity_weight: 0.01
  batch_uniformity_hinge_location: 0.7
output_dir: safa_extractor_agg_dim256_no_dropout
tensorboard_output: null
